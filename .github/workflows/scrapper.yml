name: Steam Analytics Automation

on:
  schedule:
    # Runs every 4 hours: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests psycopg2-binary

      - name: Run Discovery Pass (Weekly Catalog Refresh)
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python discovery.py

      - name: Run Metric Enrichment Pass
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BATCH_SIZE: 4000
          PYTHONUNBUFFERED: "1"  
        run: python -u scraper.py