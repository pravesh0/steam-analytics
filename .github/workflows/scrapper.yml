name: Steam Analytics Daily Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: steam-scraper-run
  cancel-in-progress: false # Set to 'true' if you want a new manual click to cancel the old run, or 'false' to let the current one finish first.

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install requests psycopg2-binary

      - name: Run Scraper Script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python scraper.py